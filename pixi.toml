[workspace]
authors = ["stijn", "benny", "andres"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge", "https://conda.modular.com/max"]
description = "Basalt is a stand-alone machine learning framework that leverages the power of Mojo."
name = "Basalt"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
test = { cmd = "mojo test -I . tests" }
test_mojo = { cmd = "mojo test -I . tests/mojo" }
test_python = { cmd = "mojo test -I . tests/python" }
format = { cmd = "mojo format basalt/" }
package = { cmd = "mojo package basalt"}

[dependencies]
pytorch = ">=2.11.0,<3"
torchvision = ">=0.26.0,<0.27"
torchaudio = ">=2.11.0,<3"
onnx = ">=1.21.0,<2"
pandas = ">=3.0.3,<4"
mojo = ">=1.0.0b3.dev2026061606,<2"

[pypi-dependencies]
